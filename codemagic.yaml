workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodeMagic API Key
    environment:
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "co.myibe.app"
        TEAM_ID: "669NSSC9CW"
        APP_STORE_APP_ID: "6742460190"
      node: 18
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          cd myvibe-main
          npm ci

      - name: Create env file
        script: |
          cd myvibe-main
          echo "VUE_APP_API_URL=https://api.myvibeapp.site" > .env

      - name: Build web assets
        script: |
          cd myvibe-main
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd myvibe-main
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd myvibe-main/ios/App
          pod install

      - name: Set up code signing
        script: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          KEYCHAIN_PASSWORD="temporary"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/profile.mobileprovision))
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "Profile UUID: $PROFILE_UUID"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Configure signing for App target only
        script: |
          cd myvibe-main/ios/App

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/profile.mobileprovision))

          python3 << 'PYEOF'
          import re, sys

          with open('App.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()

          # Find all build configuration sections for the App target
          # We need to set manual signing only where PRODUCT_BUNDLE_IDENTIFIER = co.myibe.app
          # Replace CODE_SIGN_STYLE only near PRODUCT_BUNDLE_IDENTIFIER lines
          lines = content.split('\n')
          new_lines = []
          i = 0
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)

              # When we find bundle ID for our app, inject signing settings after it
              if 'PRODUCT_BUNDLE_IDENTIFIER' in line and 'co.myibe.app' in line:
                  # Check if CODE_SIGN_STYLE already exists nearby (within next 5 lines)
                  has_sign_style = False
                  for j in range(i+1, min(i+6, len(lines))):
                      if 'CODE_SIGN_STYLE' in lines[j]:
                          has_sign_style = True
                          break

                  if not has_sign_style:
                      indent = '\t\t\t\t'
                      new_lines.append(f'{indent}CODE_SIGN_STYLE = Manual;')
                      new_lines.append(f'{indent}"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";')
                      new_lines.append(f'{indent}PROVISIONING_PROFILE_SPECIFIER = "MyVibe AppStore";')

              # Replace existing CODE_SIGN_STYLE for App target sections
              # (identified by being near PRODUCT_BUNDLE_IDENTIFIER = co.myibe.app)
              i += 1

          content = '\n'.join(new_lines)

          # Also replace any existing CODE_SIGN_STYLE = Automatic that's in App target
          # We do this by finding blocks that contain co.myibe.app
          content = re.sub(
              r'(PRODUCT_BUNDLE_IDENTIFIER = co\.myibe\.app;.*?)(CODE_SIGN_STYLE = )Automatic;',
              r'\1\2Manual;',
              content,
              flags=re.DOTALL
          )

          with open('App.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)

          print("Done configuring App target signing")
          PYEOF

      - name: Set version number
        script: |
          cd myvibe-main/ios/App
          agvtool new-marketing-version 1.2.0
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD + 1))

      - name: Build iOS archive
        script: |
          cd myvibe-main/ios/App

          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      - name: Export IPA
        script: |
          cd myvibe-main/ios/App

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>MyVibe AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload to TestFlight
        script: |
          APP_FILE=$(find myvibe-main/ios/App/build/ipa -name "*.ipa" | head -1)
          echo "Uploading: $APP_FILE"
          xcrun altool --upload-app \
            -f "$APP_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - myvibe-main/ios/App/build/ipa/*.ipa
workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodeMagic API Key
    environment:
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "co.myibe.app"
        TEAM_ID: "669NSSC9CW"
        APP_STORE_APP_ID: "6742460190"
      node: 18
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          cd myvibe-main
          npm ci

      - name: Create env file
        script: |
          cd myvibe-main
          echo "VUE_APP_API_URL=https://api.myvibeapp.site" > .env

      - name: Build web assets
        script: |
          cd myvibe-main
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd myvibe-main
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd myvibe-main/ios/App
          pod install

      - name: Set up code signing
        script: |
          keychain initialize

          # Decode and import certificate
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $P12_PASSWORD

          # Decode API key from base64
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          # Verify key file is valid PEM
          echo "--- Key file verify ---"
          head -1 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          tail -1 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          wc -l ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "--- End verify ---"

      - name: Set up Xcode project settings
        script: |
          cd myvibe-main/ios/App
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' App.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = $TEAM_ID;/g" App.xcodeproj/project.pbxproj

      - name: Set version number
        script: |
          cd myvibe-main/ios/App
          agvtool new-marketing-version 1.2.0
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD + 1))

      - name: Build iOS archive
        script: |
          cd myvibe-main/ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        script: |
          cd myvibe-main/ios/App

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        script: |
          APP_FILE=$(find myvibe-main/ios/App/build/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$APP_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - myvibe-main/ios/App/build/ipa/*.ipa
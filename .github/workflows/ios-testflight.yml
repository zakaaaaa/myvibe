name: Build & Upload to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'myvibe-main/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: myvibe-main/package-lock.json

      - name: Install dependencies
        working-directory: myvibe-main
        run: npm ci

      - name: Create .env file
        working-directory: myvibe-main
        run: echo "VUE_APP_API_URL=https://api.myvibeapp.site" > .env

      - name: Build web assets
        working-directory: myvibe-main
        run: npm run build

      - name: Sync Capacitor iOS
        working-directory: myvibe-main
        run: npx cap sync ios

      - name: Set app version
        working-directory: myvibe-main/ios/App
        run: |
          plutil -replace CFBundleShortVersionString -string "1.2.0" App/Info.plist
          plutil -replace CFBundleVersion -string "${{ github.run_number }}" App/Info.plist

      - name: Install CocoaPods
        working-directory: myvibe-main/ios/App
        run: |
          pod install || true

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          # Decode certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Create provisioning profile
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Create API key file for xcodebuild
          mkdir -p ~/.private_keys
          echo "$APPSTORE_API_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APPSTORE_API_KEY_ID.p8

      - name: Build archive
        working-directory: myvibe-main/ios/App
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_API_KEY_ID.p8 \
            -authenticationKeyID $APPSTORE_API_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # Create export options plist
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_API_KEY_ID.p8 \
            -authenticationKeyID $APPSTORE_API_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/App.ipa \
            -t ios \
            --apiKey $APPSTORE_API_KEY_ID \
            --apiIssuer $APPSTORE_ISSUER_ID

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -rf ~/.private_keys
